<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Domino</title>

<style>
body {
  margin: 0;
  background: #e6e6e6;
  font-family: sans-serif;
}

#board {
  width: 100%;
  height: 80vh;
  position: relative;
  background: #f5f5f5;
}

.domino {
  position: absolute;
  width: 120px;
  height: 60px;
  background: #d8cccc;
  border-radius: 14px;
  display: flex;
  overflow: hidden;
  border: 2px solid #999;
  cursor: grab;
}

.half {
  width: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}

.divider {
  width: 2px;
  background: #555;
}
</style>
</head>

<body>

<div id="board"></div>

<script>
const board = document.getElementById("board");

let tiles = [
  ["🍌","🔔"],
  ["🔔","🔔"],
  ["📚","🚗"],
  ["🚗","🐱"]
];

let ends = [];

function createTile(data, x=100, y=300) {

  const tile = document.createElement("div");
  tile.className = "domino";

  const left = document.createElement("div");
  left.className = "half";
  left.textContent = data[0];

  const divider = document.createElement("div");
  divider.className = "divider";

  const right = document.createElement("div");
  right.className = "half";
  right.textContent = data[1];

  tile.append(left, divider, right);
  board.appendChild(tile);

  tile.style.left = x + "px";
  tile.style.top = y + "px";

  makeDrag(tile, data);

  return tile;
}
function makeDrag(tile, data) {

  tile.onmousedown = (e) => {

    let shiftX = e.clientX - tile.getBoundingClientRect().left;
    let shiftY = e.clientY - tile.getBoundingClientRect().top;

    document.onmousemove = (e) => {
      tile.style.left = e.pageX - shiftX + "px";
      tile.style.top = e.pageY - shiftY + "px";
    };

    document.onmouseup = () => {
      document.onmousemove = null;
      document.onmouseup = null;

      tryAttach(tile, data);
    };
  };
}
function tryAttach(tile, data) {

  if (ends.length === 0) {
    ends.push({
      value: data[0],
      x: parseInt(tile.style.left),
      y: parseInt(tile.style.top)
    });

    ends.push({
      value: data[1],
      x: parseInt(tile.style.left) + 120,
      y: parseInt(tile.style.top)
    });

    return;
  }

  for (let end of ends) {

    if (end.value === data[0] || end.value === data[1]) {

      if (end.value === data[1]) {
        data = [data[1], data[0]];
        tile.children[0].textContent = data[0];
        tile.children[2].textContent = data[1];
      }

      tile.style.left = end.x + "px";
      tile.style.top = end.y + "px";

      end.value = data[1];

      return;
    }
  }
}

tiles.forEach((t,i)=>{
  createTile(t, 50 + i*130, 400);
});
</script>

</body>
</html>
