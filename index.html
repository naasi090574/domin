<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Домино</title>

<style>
body {
  margin:0;
  background:#e5e5e5;
  overflow:hidden;
  font-family:sans-serif;
}

#board {
  width:100vw;
  height:100vh;
  position:relative;
}

/* ДОМИНОШКА */
.domino {
  position:absolute;
  width:120px;
  height:60px;
  background-image:url("https://img.genially.com/66f849d0f7b39c0016fdd814/1b542f23-1e28-4a88-b5a2-1d88bdef2067.png");
  background-size:cover;
  display:flex;
}

/* половинки */
.half {
  width:50%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}

.half img {
  width:70%;
  height:70%;
  object-fit:contain;
}

/* подсветка */
.highlight {
  position:absolute;
  width:120px;
  height:60px;
  border:2px solid #8b5cf6;
  border-radius:12px;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="board"></div>

<script>

const SIZE = 60;
const board = document.getElementById("board");

let chain = [];

function createDomino(x, y, left, right, vertical=false){

  const el = document.createElement("div");
  el.className = "domino";

  if(vertical){
    el.style.width = "60px";
    el.style.height = "120px";
    el.style.flexDirection = "column";
  }

  el.style.left = x + "px";
  el.style.top = y + "px";

  const leftDiv = document.createElement("div");
  leftDiv.className = "half";
  const rightDiv = document.createElement("div");
  rightDiv.className = "half";

  leftDiv.innerHTML = `<img src="${left}">`;
  rightDiv.innerHTML = `<img src="${right}">`;

  el.appendChild(leftDiv);
  el.appendChild(rightDiv);

  board.appendChild(el);

  makeDraggable(el, {left,right});

}

function makeDraggable(el, data){

  el.onmousedown = function(e){

    const shiftX = e.clientX - el.offsetLeft;
    const shiftY = e.clientY - el.offsetTop;

    function moveAt(pageX, pageY){
      el.style.left = pageX - shiftX + 'px';
      el.style.top = pageY - shiftY + 'px';
    }

    function onMouseMove(e){
      moveAt(e.pageX, e.pageY);
    }

    document.addEventListener('mousemove', onMouseMove);

    document.onmouseup = function(){

      document.removeEventListener('mousemove', onMouseMove);
      document.onmouseup = null;

      trySnap(el, data);
    };
  };
}

function trySnap(el, data){

  for(let item of chain){

    const dx = el.offsetLeft - item.x;
    const dy = el.offsetTop - item.y;

    // ПРАВО
    if(Math.abs(dx - SIZE*2) < 30 && Math.abs(dy) < 30){
      if(data.left === item.right){
        place(el, item.x + SIZE*2, item.y, false);
        return;
      }
    }

    // ЛЕВО
    if(Math.abs(dx + SIZE*2) < 30 && Math.abs(dy) < 30){
      if(data.right === item.left){
        place(el, item.x - SIZE*2, item.y, false);
        return;
      }
    }

    // ВНИЗ
    if(Math.abs(dy - SIZE*2) < 30 && Math.abs(dx) < 30){
      if(data.left === item.right){
        place(el, item.x, item.y + SIZE*2, true);
        return;
      }
    }

    // ВВЕРХ
    if(Math.abs(dy + SIZE*2) < 30 && Math.abs(dx) < 30){
      if(data.right === item.left){
        place(el, item.x, item.y - SIZE*2, true);
        return;
      }
    }
  }
}

function place(el, x, y, vertical){

  el.style.left = x + "px";
  el.style.top = y + "px";

  if(vertical){
    el.style.width = "60px";
    el.style.height = "120px";
    el.style.flexDirection = "column";
  }

  chain.push({
    x,
    y,
    left: el.children[0].querySelector("img").src,
    right: el.children[1].querySelector("img").src
  });
}

/* старт */
createDomino(400,300,"https://cdn-icons-png.flaticon.com/512/616/616408.png","https://cdn-icons-png.flaticon.com/512/616/616408.png");

createDomino(200,200,"https://cdn-icons-png.flaticon.com/512/616/616408.png","https://cdn-icons-png.flaticon.com/512/188/188987.png");
createDomino(200,350,"https://cdn-icons-png.flaticon.com/512/188/188987.png","https://cdn-icons-png.flaticon.com/512/616/616408.png");

</script>

</body>
</html>
