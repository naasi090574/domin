<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Домино — редактор и игра</title>
  <style>
    :root {
      --page-bg: #e7b1ae;
      --panel-bg: #9fb0a3;
      --board-bg: #f3f3f3;
      --button-bg: #6c33ff;
      --button-text: #ffffff;
      --text-color: #111111;
      --tile-bg: #d8c8c8;
      --tile-border: #ece7e7;
      --tile-divider: #666666;
      --snap-color: rgba(108, 51, 255, 0.5);
      --ui-font: "DM Sans", Arial, sans-serif;
      --left-w: 250px;
      --right-w: 320px;
      --strip-h: 110px;
      --cell: 66px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--page-bg);
      color: var(--text-color);
      font-family: var(--ui-font);
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: var(--left-w) 1fr var(--right-w);
      height: 100vh;
      width: 100vw;
    }

    .left, .right, .strip { background: var(--panel-bg); }

    .left {
      padding: 18px;
      border-right: 1px solid rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .turn {
      padding: 16px;
      border-radius: 18px;
      background: var(--button-bg);
      color: var(--button-text);
      text-align: center;
      font-weight: 800;
      box-shadow: 0 10px 25px rgba(108, 51, 255, .18);
    }

    .bank {
      min-height: 110px;
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 12px;
    }

    .bank-count {
      font-size: 46px;
      font-weight: 900;
      color: var(--button-bg);
      line-height: 1;
    }

    .bank-label { opacity: .8; margin-top: 8px; }

    .btn {
      border: 0;
      border-radius: 18px;
      padding: 16px 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .btn.primary {
      background: var(--button-bg);
      color: var(--button-text);
      box-shadow: 0 10px 25px rgba(108, 51, 255, .18);
    }

    .btn.secondary {
      background: transparent;
      color: var(--text-color);
      border: 3px solid var(--button-bg);
    }

    .zoom-row {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .zoom {
      min-height: 70px;
      font-size: 32px;
      line-height: 1;
      background: var(--button-bg);
      color: var(--button-text);
      border: 0;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(108, 51, 255, .18);
    }

    .center {
      display: grid;
      grid-template-rows: var(--strip-h) 1fr var(--strip-h);
      min-width: 0;
      min-height: 0;
    }

    .strip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      overflow-x: auto;
      border-bottom: 1px solid rgba(0,0,0,.06);
    }

    .strip.bottom {
      border-top: 1px solid rgba(0,0,0,.06);
      border-bottom: 0;
    }

    .strip-title {
      font-weight: 800;
      opacity: .78;
      margin-right: 8px;
      flex: 0 0 auto;
    }

    .board-shell {
      position: relative;
      background: var(--board-bg);
      overflow: hidden;
    }

    .board-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
    }

    .board-viewport.panning { cursor: grabbing; }

    .board-canvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 4200px;
      height: 3200px;
      transform-origin: top left;
    }

    .domino {
      position: absolute;
      width: calc(var(--cell) * 2);
      height: var(--cell);
      background: var(--tile-bg);
      border: 3px solid var(--tile-border);
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(0,0,0,.10);
      display: grid;
      grid-template-columns: 1fr 2px 1fr;
      align-items: center;
      justify-items: center;
      user-select: none;
      touch-action: none;
    }

    .domino.vertical {
      width: var(--cell);
      height: calc(var(--cell) * 2);
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 2px 1fr;
    }

    .domino.in-hand { cursor: grab; }
    .domino.dragging { opacity: .95; z-index: 9999; }
    .domino.locked { cursor: default; }

    .face {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 6px;
    }

    .face-content {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      border-radius: 12px;
      overflow: hidden;
      font-size: 42px;
      line-height: 1;
    }

    .face-content img {
      max-width: 78%;
      max-height: 78%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }

    .divider {
      width: 2px;
      height: 72%;
      background: var(--tile-divider);
      border-radius: 2px;
    }

    .domino.vertical .divider {
      width: 72%;
      height: 2px;
    }

    .mini {
      position: static;
      width: 108px;
      height: 54px;
      min-width: 108px;
      border-width: 2px;
      border-radius: 12px;
      box-shadow: none;
      background: color-mix(in srgb, var(--tile-bg) 96%, white 4%);
    }

    .mini.vertical { width: 54px; height: 108px; }
    .mini .face-content { font-size: 24px; }
    .mini .face-content img { max-width: 72%; max-height: 72%; }

    .snap-zone {
      position: absolute;
      border: 3px solid var(--snap-color);
      border-radius: 16px;
      background: color-mix(in srgb, var(--snap-color) 14%, white 86%);
      pointer-events: none;
      opacity: 0;
      transition: opacity .08s ease;
      z-index: 20;
      box-shadow: 0 8px 18px rgba(108, 51, 255, .10);
    }

    .snap-zone::after {
      content: "";
      position: absolute;
      background: color-mix(in srgb, var(--snap-color) 70%, #666 30%);
      border-radius: 2px;
      opacity: .9;
    }

    .snap-zone.horizontal::after {
      width: 2px;
      height: 72%;
      left: calc(50% - 1px);
      top: 14%;
    }

    .snap-zone.vertical::after {
      width: 72%;
      height: 2px;
      left: 14%;
      top: calc(50% - 1px);
    }

    .snap-zone.visible { opacity: 1; }

    .right {
      padding: 16px;
      border-left: 1px solid rgba(0,0,0,.08);
      overflow-y: auto;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .group {
      background: rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .group h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .row:last-child { margin-bottom: 0; }

    input[type="color"] {
      width: 44px;
      height: 32px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      border-radius: 10px;
    }

    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,.15);
      font: inherit;
      background: rgba(255,255,255,.92);
    }

    .face-map {
      display: grid;
      gap: 10px;
    }

    .face-item {
      background: rgba(255,255,255,.18);
      border-radius: 14px;
      padding: 10px;
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 10px;
      align-items: center;
    }

    .face-preview {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: rgba(255,255,255,.8);
      display: grid;
      place-items: center;
      font-size: 26px;
      overflow: hidden;
    }

    .face-preview img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
    }

    .small-note {
      font-size: 12px;
      opacity: .75;
      line-height: 1.35;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="left">
      <div class="turn" id="turnLabel">Ход: Игрок 1</div>
      <div class="bank">
        <div>
          <div class="bank-count" id="bankCount">14</div>
          <div class="bank-label">В банке</div>
        </div>
      </div>
      <button class="btn primary" id="drawBtn">Взять из банка</button>

      <!-- ИЗМЕНЕНО: кнопку Пропустить ход убрали -->
      <!-- <button class="btn secondary" id="passBtn">Пропустить ход</button> -->

      <button class="btn secondary" id="shuffleBtn">Перемешать</button>
      <button class="btn secondary" id="restartBtn">Начать заново</button>
      <div class="zoom-row">
        <button class="zoom" id="zoomOut">−</button>
        <button class="zoom" id="zoomIn">+</button>
      </div>
    </aside>

    <main class="center">
      <section class="strip top" id="player2Strip">
        <div class="strip-title">ИГРОК 2</div>
      </section>

      <section class="board-shell">
        <div class="board-viewport" id="viewport">
          <div class="board-canvas" id="canvas"></div>
        </div>
      </section>

      <section class="strip bottom" id="player1Strip">
        <div class="strip-title">ИГРОК 1</div>
      </section>
    </main>

    <aside class="right">
      <div class="panel-title">Редактор оформления</div>

      <div class="group">
        <h3>Фоны</h3>
        <label class="row"><span>Фон страницы</span><input type="color" data-var="--page-bg" value="#e7b1ae"></label>
        <label class="row"><span>Цвет игрового поля</span><input type="color" data-var="--board-bg" value="#f3f3f3"></label>
        <label class="row"><span>Фон панели</span><input type="color" data-var="--panel-bg" value="#9fb0a3"></label>
      </div>

      <div class="group">
        <h3>Интерфейс</h3>
        <label class="row"><span>Цвет кнопок</span><input type="color" data-var="--button-bg" value="#6c33ff"></label>
        <label class="row"><span>Цвет текста кнопок</span><input type="color" data-var="--button-text" value="#ffffff"></label>
        <label class="row"><span>Общий цвет текста</span><input type="color" data-var="--text-color" value="#111111"></label>
        <div class="row" style="grid-template-columns:1fr;">
          <select id="fontSelect">
            <option value='"DM Sans", Arial, sans-serif'>DM Sans</option>
            <option value='Arial, sans-serif'>Arial</option>
            <option value='Verdana, sans-serif'>Verdana</option>
            <option value='"Trebuchet MS", sans-serif'>Trebuchet MS</option>
          </select>
        </div>
      </div>

      <div class="group">
        <h3>Плитка домино</h3>
        <label class="row"><span>Фон плитки</span><input type="color" data-var="--tile-bg" value="#d8c8c8"></label>
        <label class="row"><span>Цвет разделительной линии</span><input type="color" data-var="--tile-divider" value="#666666"></label>
        <label class="row"><span>Цвет границы плитки</span><input type="color" data-var="--tile-border" value="#ece7e7"></label>
      </div>

      <div class="group">
        <h3>Картинки граней</h3>
        <div class="face-map" id="faceMap"></div>
        <div class="small-note">Можно заменить картинки. Если файл не выбран, остаётся текущий символ.</div>
      </div>
    </aside>
  </div>

  <script>
    const root = document.documentElement;
    document.querySelectorAll('input[data-var]').forEach(input => {
      input.addEventListener('input', () => root.style.setProperty(input.dataset.var, input.value));
    });
    document.getElementById('fontSelect').addEventListener('change', e => {
      root.style.setProperty('--ui-font', e.target.value);
    });

    // ИЗМЕНЕНО: добавили 7-ю картинку cat
    const FACE_LIBRARY = {
      dino:  { label: 'Динозавр', value: '🦕', src: null },
      duck:  { label: 'Утёнок', value: '🐥', src: null },
      bunny: { label: 'Заяц', value: '🐰', src: null },
      dog:   { label: 'Собачка', value: '🐶', src: null },
      bear:  { label: 'Мишка', value: '🧸', src: null },
      fox:   { label: 'Лиса', value: '🦊', src: null },
      cat:   { label: 'Котик', value: '🐱', src: null }
    };

    // ИЗМЕНЕНО: добавили gameOver
    const GAME = {
      CELL: 66,
      viewport: document.getElementById('viewport'),
      canvas: document.getElementById('canvas'),
      player1Strip: document.getElementById('player1Strip'),
      player2Strip: document.getElementById('player2Strip'),
      turnLabel: document.getElementById('turnLabel'),
      bankCount: document.getElementById('bankCount'),
      scale: 1,
      panX: -250,
      panY: -220,
      panning: false,
      pointerStartX: 0,
      pointerStartY: 0,
      startPanX: 0,
      startPanY: 0,
      currentPlayer: 1,
      bank: [],
      hands: { 1: [], 2: [] },
      placed: [],
      endpoints: [],
      nextId: 1,
      activeSnaps: [],
      gameOver: false
    };

    // ИЗМЕНЕНО: теперь 28 костяшек из 7 картинок
    const ALL_TILES = (() => {
      const keys = ['dino', 'duck', 'bunny', 'dog', 'bear', 'fox', 'cat'];
      const result = [];
      for (let i = 0; i < keys.length; i++) {
        for (let j = i; j < keys.length; j++) {
          result.push([keys[i], keys[j]]);
        }
      }
      return result;
    })();

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function renderFace(el, key) {
      el.innerHTML = '';
      const content = document.createElement('div');
      content.className = 'face-content';
      const face = FACE_LIBRARY[key];
      if (face.src) {
        const img = document.createElement('img');
        img.src = face.src;
        img.alt = face.label;
        content.appendChild(img);
      } else {
        content.textContent = face.value;
      }
      el.appendChild(content);
    }

    function createDominoElement(tile, mini = false) {
      const el = document.createElement('div');
      el.className = mini ? 'domino mini in-hand' : 'domino in-hand';
      if (tile.orientation === 'V') el.classList.add('vertical');
      el.dataset.id = tile.id;

      const aFace = document.createElement('div');
      aFace.className = 'face face-a';

      const divider = document.createElement('div');
      divider.className = 'divider';

      const bFace = document.createElement('div');
      bFace.className = 'face face-b';

      renderFace(aFace, tile.a);
      renderFace(bFace, tile.b);
      el.append(aFace, divider, bFace);
      return el;
    }

    function createTile(a, b) {
      return {
        id: 't' + (GAME.nextId++),
        a,
        b,
        orientation: 'H',
        gx: 0,
        gy: 0,
        placed: false,
        element: null,
        player: 1
      };
    }

    function swapFaces(tile) {
      [tile.a, tile.b] = [tile.b, tile.a];
      renderFace(tile.element.querySelector('.face-a'), tile.a);
      renderFace(tile.element.querySelector('.face-b'), tile.b);
    }

    function applyOrientation(tile, orientation) {
      tile.orientation = orientation;
      tile.element.classList.toggle('vertical', orientation === 'V');
    }

    function getPixelRectFromGrid(tile) {
      if (tile.orientation === 'H') {
        return {
          x: tile.gx * GAME.CELL,
          y: tile.gy * GAME.CELL,
          w: GAME.CELL * 2,
          h: GAME.CELL
        };
      }
      return {
        x: tile.gx * GAME.CELL,
        y: tile.gy * GAME.CELL,
        w: GAME.CELL,
        h: GAME.CELL * 2
      };
    }

    function placeElementFromGrid(tile) {
      const r = getPixelRectFromGrid(tile);
      tile.element.style.left = r.x + 'px';
      tile.element.style.top = r.y + 'px';
    }

    function getOccupiedCells(tile) {
      if (tile.orientation === 'H') {
        return [
          { x: tile.gx, y: tile.gy, face: 'a' },
          { x: tile.gx + 1, y: tile.gy, face: 'b' }
        ];
      }
      return [
        { x: tile.gx, y: tile.gy, face: 'a' },
        { x: tile.gx, y: tile.gy + 1, face: 'b' }
      ];
    }

    function cellKey(x, y) {
      return `${x}:${y}`;
    }

    function buildOccupiedSet(ignoreTileId = null) {
      const set = new Set();
      for (const tile of GAME.placed) {
        if (tile.id === ignoreTileId) continue;
        for (const c of getOccupiedCells(tile)) {
          set.add(cellKey(c.x, c.y));
        }
      }
      return set;
    }

    function makeEndpoint(tileId, side, value, cellX, cellY) {
      return { tileId, side, value, cellX, cellY };
    }

    function getTileEndpoints(tile) {
      const cells = getOccupiedCells(tile);
      if (tile.orientation === 'H') {
        return [
          makeEndpoint(tile.id, 'left', tile.a, cells[0].x, cells[0].y),
          makeEndpoint(tile.id, 'right', tile.b, cells[1].x, cells[1].y)
        ];
      }
      return [
        makeEndpoint(tile.id, 'top', tile.a, cells[0].x, cells[0].y),
        makeEndpoint(tile.id, 'bottom', tile.b, cells[1].x, cells[1].y)
      ];
    }

    function resetEndpointsFromPlaced() {
  const all = [];

  for (const tile of GAME.placed) {
    all.push(...getTileEndpoints(tile));
  }

  const used = new Set();

  for (let i = 0; i < all.length; i++) {
    for (let j = i + 1; j < all.length; j++) {
      if (all[i].value !== all[j].value) continue;

      const a = all[i];
      const b = all[j];

      const horizontalTouch =
        a.cellY === b.cellY &&
        Math.abs(a.cellX - b.cellX) === 1 &&
        (
          (a.side === 'right' && b.side === 'left') ||
          (a.side === 'left' && b.side === 'right')
        );

      const verticalTouch =
        a.cellX === b.cellX &&
        Math.abs(a.cellY - b.cellY) === 1 &&
        (
          (a.side === 'bottom' && b.side === 'top') ||
          (a.side === 'top' && b.side === 'bottom')
        );

      if (horizontalTouch || verticalTouch) {
        used.add(`${a.tileId}:${a.side}:${a.cellX}:${a.cellY}`);
        used.add(`${b.tileId}:${b.side}:${b.cellX}:${b.cellY}`);
      }
    }
  }

  GAME.endpoints = all.filter(e => {
    const key = `${e.tileId}:${e.side}:${e.cellX}:${e.cellY}`;
    return !used.has(key);
  });
}
    // ИЗМЕНЕНО: служебные функции для автоперехода хода и конца игры
    function otherPlayer(player) {
      return player === 1 ? 2 : 1;
    }

    function playerHasMove(player) {
      if (!GAME.hands[player].length) return false;
      if (!GAME.placed.length) return GAME.hands[player].length > 0;

      for (const tile of GAME.hands[player]) {
        for (const end of GAME.endpoints) {
          if (tile.a !== end.value && tile.b !== end.value) continue;
          for (const dir of allowedDirections(end.side)) {
            const candidate = placementFor(end, dir, tile);
            if (candidate) return true;
          }
        }
      }
      return false;
    }

    function countPlayerTiles(player) {
      return GAME.hands[player].length;
    }

    function finishGame(message) {
      GAME.gameOver = true;
      GAME.turnLabel.textContent = message;
      setTimeout(() => alert(message), 50);
    }

    function checkBlockedGame() {
      if (GAME.bank.length > 0) return false;

      const p1Can = playerHasMove(1);
      const p2Can = playerHasMove(2);

      if (p1Can || p2Can) return false;

      const p1Count = countPlayerTiles(1);
      const p2Count = countPlayerTiles(2);

      if (p1Count < p2Count) {
        finishGame(`Игра окончена. Банк пуст, ходов нет. Победил Игрок 1 — у него меньше костяшек (${p1Count} против ${p2Count}).`);
      } else if (p2Count < p1Count) {
        finishGame(`Игра окончена. Банк пуст, ходов нет. Победил Игрок 2 — у него меньше костяшек (${p2Count} против ${p1Count}).`);
      } else {
        finishGame(`Игра окончена. Банк пуст, ходов нет. Ничья — у игроков одинаковое количество костяшек (${p1Count}).`);
      }

      return true;
    }

    function advanceTurnAfterMove(previousPlayer) {
      if (GAME.gameOver) return;

      if (GAME.hands[previousPlayer].length === 0) {
        finishGame(`Игра окончена. Победил Игрок ${previousPlayer} — у него закончились костяшки.`);
        return;
      }

      const next = otherPlayer(previousPlayer);
      GAME.currentPlayer = next;
      renderHands();

      if (playerHasMove(next)) return;

      if (GAME.bank.length > 0) {
        GAME.turnLabel.textContent = `Ход: Игрок ${next} — возьмите из банка`;
        return;
      }

      const back = previousPlayer;
      if (playerHasMove(back)) {
        GAME.currentPlayer = back;
        renderHands();
        return;
      }

      checkBlockedGame();
    }

    function afterDrawCheck() {
      if (GAME.gameOver) return;

      if (playerHasMove(GAME.currentPlayer)) {
        renderHands();
        return;
      }

      if (GAME.bank.length > 0) {
        GAME.turnLabel.textContent = `Ход: Игрок ${GAME.currentPlayer} — возьмите из банка`;
        return;
      }

      const other = otherPlayer(GAME.currentPlayer);
      if (playerHasMove(other)) {
        GAME.currentPlayer = other;
        renderHands();
        return;
      }

      checkBlockedGame();
    }

    function renderHands() {
      [1, 2].forEach(player => {
        const strip = player === 1 ? GAME.player1Strip : GAME.player2Strip;
        strip.querySelectorAll('.mini.domino').forEach(el => el.remove());

        GAME.hands[player].forEach(tile => {
          if (!tile.element) tile.element = createDominoElement(tile, true);
          tile.element.className = 'domino mini in-hand';
          tile.element.classList.remove('vertical', 'locked');
          tile.orientation = 'H';
          renderFace(tile.element.querySelector('.face-a'), tile.a);
          renderFace(tile.element.querySelector('.face-b'), tile.b);
          enableDrag(tile);
          strip.appendChild(tile.element);
        });
      });

      GAME.turnLabel.textContent = `Ход: Игрок ${GAME.currentPlayer}`;
      GAME.bankCount.textContent = String(GAME.bank.length);
    }

    function clearSnaps() {
      GAME.activeSnaps.forEach(z => z.remove());
      GAME.activeSnaps = [];
    }

    function addSnapZone(px, py, orientation) {
      const z = document.createElement('div');
      z.className = `snap-zone ${orientation === 'H' ? 'horizontal' : 'vertical'} visible`;
      z.style.left = px + 'px';
      z.style.top = py + 'px';
      z.style.width = (orientation === 'H' ? GAME.CELL * 2 : GAME.CELL) + 'px';
      z.style.height = (orientation === 'H' ? GAME.CELL : GAME.CELL * 2) + 'px';
      GAME.canvas.appendChild(z);
      GAME.activeSnaps.push(z);
    }

    function allowedDirections(side) {
      if (side === 'right') return ['right', 'up', 'down'];
      if (side === 'left') return ['left', 'up', 'down'];
      if (side === 'top') return ['up', 'left', 'right'];
      return ['down', 'left', 'right'];
    }

    function placementFor(endpoint, dir, tile) {
// 🚫 запрещаем ставить "назад" в цепочку
if (
  (endpoint.side === 'right' && dir === 'left') ||
  (endpoint.side === 'left' && dir === 'right') ||
  (endpoint.side === 'top' && dir === 'down') ||
  (endpoint.side === 'bottom' && dir === 'up')
) {
  return null;
}
      const occupied = buildOccupiedSet();

      let orientation = 'H';
      let gx = 0;
      let gy = 0;
      let matchFace = null;

      if (dir === 'right') {
        orientation = 'H';
        gx = endpoint.cellX + 1;
        gy = endpoint.cellY;
        matchFace = 'a';
      }

      if (dir === 'left') {
        orientation = 'H';
        gx = endpoint.cellX - 2;
        gy = endpoint.cellY;
        matchFace = 'b';
      }

      if (dir === 'down') {
        orientation = 'V';
        gx = endpoint.cellX;
        gy = endpoint.cellY + 1;
        matchFace = 'a';
      }

      if (dir === 'up') {
        orientation = 'V';
        gx = endpoint.cellX;
        gy = endpoint.cellY - 2;
        matchFace = 'b';
      }

      const matchesA = tile.a === endpoint.value;
      const matchesB = tile.b === endpoint.value;
      if (!matchesA && !matchesB) return null;

      const swapNeeded =
        (matchFace === 'a' && !matchesA) ||
        (matchFace === 'b' && !matchesB);

      const cells =
        orientation === 'H'
          ? [{ x: gx, y: gy }, { x: gx + 1, y: gy }]
          : [{ x: gx, y: gy }, { x: gx, y: gy + 1 }];

      if (occupied.has(cellKey(cells[0].x, cells[0].y)) || occupied.has(cellKey(cells[1].x, cells[1].y))) {
        return null;
      }

      return { orientation, gx, gy, swapNeeded, dir, endpoint };
    }

    function showSnapsForDrag(tile) {
      clearSnaps();

      for (const end of GAME.endpoints) {
        if (tile.a !== end.value && tile.b !== end.value) continue;

        for (const dir of allowedDirections(end.side)) {
          const candidate = placementFor(end, dir, tile);
          if (!candidate) continue;

          const px = candidate.gx * GAME.CELL;
          const py = candidate.gy * GAME.CELL;
          addSnapZone(px, py, candidate.orientation);
        }
      }
    }

    function getCanvasPointer(e) {
      const rect = GAME.viewport.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left - GAME.panX) / GAME.scale,
        y: (e.clientY - rect.top - GAME.panY) / GAME.scale
      };
    }

    function choosePlacement(tile, pointer) {
      let best = null;

      for (const end of GAME.endpoints) {
        if (tile.a !== end.value && tile.b !== end.value) continue;

        for (const dir of allowedDirections(end.side)) {
          const candidate = placementFor(end, dir, tile);
          if (!candidate) continue;

          const cx = candidate.gx * GAME.CELL + (candidate.orientation === 'H' ? GAME.CELL : GAME.CELL / 2);
          const cy = candidate.gy * GAME.CELL + (candidate.orientation === 'H' ? GAME.CELL / 2 : GAME.CELL);

          const dist = Math.hypot(pointer.x - cx, pointer.y - cy);
          if (dist > 140) continue;

          if (!best || dist < best.dist) {
            best = { ...candidate, dist };
          }
        }
      }

      return best;
    }

    function placeTileAt(tile, candidate) {
      if (candidate.swapNeeded) swapFaces(tile);

      applyOrientation(tile, candidate.orientation);
      tile.gx = candidate.gx;
      tile.gy = candidate.gy;
      tile.placed = true;

      placeElementFromGrid(tile);

      tile.element.classList.add('locked');
      tile.element.classList.remove('mini', 'in-hand', 'dragging');

      GAME.canvas.appendChild(tile.element);
      GAME.placed.push(tile);
      resetEndpointsFromPlaced();
      return true;
    }

    function enableDrag(tile) {
      tile.element.onpointerdown = (e) => {
        if (tile.placed) return;
        if (tile.player !== GAME.currentPlayer) return;
        if (GAME.gameOver) return; // ИЗМЕНЕНО

        e.preventDefault();
        tile.element.classList.add('dragging');
        GAME.canvas.appendChild(tile.element);

        const p = getCanvasPointer(e);
        const rect = tile.element.getBoundingClientRect();
        const vRect = GAME.viewport.getBoundingClientRect();
        const tileCanvasX = (rect.left - vRect.left - GAME.panX) / GAME.scale;
        const tileCanvasY = (rect.top - vRect.top - GAME.panY) / GAME.scale;
        const shiftX = p.x - tileCanvasX;
        const shiftY = p.y - tileCanvasY;

        showSnapsForDrag(tile);

        const move = (ev) => {
          const pp = getCanvasPointer(ev);
          tile.element.style.left = `${pp.x - shiftX}px`;
          tile.element.style.top = `${pp.y - shiftY}px`;
        };

        const up = (ev) => {
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);

          tile.element.classList.remove('dragging');
          clearSnaps();

          const pp = getCanvasPointer(ev);
          const chosen = choosePlacement(tile, pp);

          if (!GAME.placed.length) {
            // ИЗМЕНЕНО: после первого хода тоже автоматический переход
            const current = GAME.currentPlayer;

            tile.orientation = 'H';
            tile.gx = Math.round(pp.x / GAME.CELL);
            tile.gy = Math.round(pp.y / GAME.CELL);
            tile.placed = true;
            tile.element.classList.remove('mini', 'in-hand', 'dragging');
            tile.element.classList.add('locked');
            placeElementFromGrid(tile);
            GAME.canvas.appendChild(tile.element);
            GAME.placed.push(tile);
            GAME.hands[current] = GAME.hands[current].filter(t => t.id !== tile.id);
            resetEndpointsFromPlaced();
            renderHands();
            advanceTurnAfterMove(current);
            return;
          }

          if (chosen) {
            // ИЗМЕНЕНО: автоматический переход после успешного хода
            const current = GAME.currentPlayer;
            placeTileAt(tile, chosen);
            GAME.hands[current] = GAME.hands[current].filter(t => t.id !== tile.id);
            renderHands();
            advanceTurnAfterMove(current);
            return;
          }

          renderHands();
        };

        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      };
    }

    function buildFaceEditor() {
      const wrap = document.getElementById('faceMap');
      wrap.innerHTML = '';

      Object.entries(FACE_LIBRARY).forEach(([key, item]) => {
        const row = document.createElement('div');
        row.className = 'face-item';

        const preview = document.createElement('div');
        preview.className = 'face-preview';

        if (item.src) {
          const img = document.createElement('img');
          img.src = item.src;
          preview.appendChild(img);
        } else {
          preview.textContent = item.value;
        }

        const controls = document.createElement('div');
        controls.innerHTML = `<div style="font-weight:700; margin-bottom:6px;">${item.label}</div>`;

        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            FACE_LIBRARY[key].src = reader.result;
            rebuildAllFaces();
            buildFaceEditor();
          };
          reader.readAsDataURL(file);
        };

        controls.appendChild(input);
        row.append(preview, controls);
        wrap.appendChild(row);
      });
    }

    function rebuildAllFaces() {
      document.querySelectorAll('.domino').forEach(dom => {
        const tile = findTileById(dom.dataset.id);
        if (!tile) return;
        renderFace(dom.querySelector('.face-a'), tile.a);
        renderFace(dom.querySelector('.face-b'), tile.b);
      });
    }

    function findTileById(id) {
      for (const p of [1, 2]) {
        const h = GAME.hands[p].find(t => t.id === id);
        if (h) return h;
      }
      return GAME.placed.find(t => t.id === id) || null;
    }

    // ИЗМЕНЕНО: добор из банка с проверкой блокировки
    function drawTile() {
      if (GAME.gameOver) return;
      if (!GAME.bank.length) {
        afterDrawCheck();
        return;
      }

      const tile = GAME.bank.pop();
      tile.player = GAME.currentPlayer;
      tile.element = createDominoElement(tile, true);
      enableDrag(tile);
      GAME.hands[GAME.currentPlayer].push(tile);
      renderHands();
      afterDrawCheck();
    }

    // ИЗМЕНЕНО: функции passTurn больше нет

    // ИЗМЕНЕНО: старт по 7 костяшек, в банке 14
    function restartGame() {
      GAME.bank = shuffle(ALL_TILES).map(([a, b]) => createTile(a, b));
      GAME.hands = { 1: [], 2: [] };
      GAME.placed = [];
      GAME.endpoints = [];
      GAME.currentPlayer = 1;
      GAME.gameOver = false;

      clearSnaps();
      GAME.canvas.querySelectorAll('.domino').forEach(el => el.remove());

      for (let i = 0; i < 7; i++) {
        const t1 = GAME.bank.pop();
        t1.player = 1;
        t1.element = createDominoElement(t1, true);
        enableDrag(t1);
        GAME.hands[1].push(t1);

        const t2 = GAME.bank.pop();
        t2.player = 2;
        t2.element = createDominoElement(t2, true);
        enableDrag(t2);
        GAME.hands[2].push(t2);
      }

      renderHands();
    }

    function shuffleHands() {
      GAME.hands[1] = shuffle(GAME.hands[1]);
      GAME.hands[2] = shuffle(GAME.hands[2]);
      renderHands();
    }

    function renderPanZoom() {
      GAME.canvas.style.transform = `translate(${GAME.panX}px, ${GAME.panY}px) scale(${GAME.scale})`;
    }

    document.getElementById('zoomIn').onclick = () => {
      GAME.scale = Math.min(1.8, +(GAME.scale + 0.1).toFixed(2));
      renderPanZoom();
    };

    document.getElementById('zoomOut').onclick = () => {
      GAME.scale = Math.max(0.6, +(GAME.scale - 0.1).toFixed(2));
      renderPanZoom();
    };

    document.getElementById('drawBtn').onclick = drawTile;
    document.getElementById('shuffleBtn').onclick = shuffleHands;
    document.getElementById('restartBtn').onclick = restartGame;

    // ИЗМЕНЕНО: обработчик passBtn удалён

    GAME.viewport.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.domino')) return;
      GAME.panning = true;
      GAME.viewport.classList.add('panning');
      GAME.pointerStartX = e.clientX;
      GAME.pointerStartY = e.clientY;
      GAME.startPanX = GAME.panX;
      GAME.startPanY = GAME.panY;
    });

    window.addEventListener('pointermove', (e) => {
      if (!GAME.panning) return;
      GAME.panX = GAME.startPanX + (e.clientX - GAME.pointerStartX);
      GAME.panY = GAME.startPanY + (e.clientY - GAME.pointerStartY);
      renderPanZoom();
    });

    window.addEventListener('pointerup', () => {
      GAME.panning = false;
      GAME.viewport.classList.remove('panning');
    });

    buildFaceEditor();
    restartGame();
    renderPanZoom();
  </script>
</body>
</html>
